packages:
  "framer-motion": "For premium cinematic scroll animations and modal transitions"
  "react-hook-form": "For robust booking form state management"
  "@hookform/resolvers": "Zod integration for the form"
  "zod": "Form schema validation matching API types"
  "date-fns": "For formatting dates in the admin dashboard"
  "zustand": "Global state management for the booking modal"
  "clsx": "Utility for constructing class names conditionally"
  "tailwind-merge": "Utility for merging tailwind classes without style conflicts"

images:
  - path: "artifacts/deriv-champions/public/images/hero-bg.png"
    description: "Dark moody cinematic abstract financial market background, glowing electric orange and gold geometric lines, luxury premium feel, deep blacks"
    aspect_ratio: "16:9"
  - path: "artifacts/deriv-champions/public/images/steve-portrait.png"
    description: "High-end cinematic portrait of a professional forex trader in a dark luxury studio with subtle electric orange rim lighting, wearing a sharp dark suit"
    aspect_ratio: "1:1"
  - path: "artifacts/deriv-champions/public/images/gold-abstract.png"
    description: "Close up abstract metallic gold and electric orange liquid or light trails over deep pitch black background, luxury financial concept"
    aspect_ratio: "16:9"

notes:
  - The booking API is at /api/bookings and uses generated react-query hooks from @workspace/api-client-react.
  - Using Zustand for lightweight global modal state so buttons anywhere can open the booking form.
